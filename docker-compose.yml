version: '3.8'
services:
  oracle-db:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: tm-oracle
    environment:
      - ORACLE_PWD=TaskPassword123
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ../../database/schema.sql:/opt/oracle/scripts/startup/01_schema.sql
      - ../../database/seed.sql:/opt/oracle/scripts/startup/02_seed.sql
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "system/TaskPassword123@localhost:1521/XEPDB1", "<<<", "exit"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: tm-backend
    depends_on:
      oracle-db:
        condition: service_healthy
    environment:
      - ConnectionStrings__OracleDb=Data Source=oracle-db:1521/XEPDB1;User Id=system;Password=TaskPassword123;
      - Jwt__Secret=SuperSecretKeyForTaskManagerApplication123!
      - Jwt__Issuer=TaskManagerAPI
      - Jwt__Audience=TaskManagerClient

  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend
    container_name: tm-frontend

  nginx:
    image: nginx:alpine
    container_name: tm-nginx
    ports:
      - "8080:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    volumes_from:
      - frontend:ro

volumes:
  oracle-data:
